name: Build and Package Release

on:
  release:
    types: [published]
  workflow_dispatch: 

# Grants the workflow permission to upload the installer to your GitHub Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Essential for GitVersion to calculate version history

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.0.0
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.0.0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    # Configures the Feenics feed with the insecure HTTP bypass for the runner
    - name: Configure Feenics NuGet Source
      run: |
        dotnet nuget add source http://nuget-secure.feenics.com/nuget -n Feenics --allow-insecure-connections

    - name: Restore NuGet Packages
      run: nuget restore FeenicsCsvImport.sln

    - name: Build Solution
      # Disables Manifest Signing to prevent certificate errors (MSB3323)
      run: |
        msbuild FeenicsCsvImport.sln `
          /p:Configuration=Release `
          /p:Version="${{ steps.gitversion.outputs.semVer }}" `
          /p:SignManifests=false `
          /p:SignAssembly=false

    - name: Compile Inno Setup Installer
      # Passes the calculated Semantic Version into the Inno Setup script
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Dynamically targets the filename generated by the .iss script
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
