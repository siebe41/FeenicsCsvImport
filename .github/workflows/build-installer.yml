name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

# 1. Install GitVersion (Upgraded to v3.1.11 to support v6 tool)
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11 
      with:
        versionSpec: '6.0.x' # Now you can safely use version 6!

    # 2. Execute GitVersion (Must match the setup version)
    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    # 2. Install NuGet tool (Using v2 to avoid the @v3 error)
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    - name: Configure Feenics Source
      run: |
        dotnet new nugetconfig --force
        dotnet nuget add source http://nuget-secure.feenics.com/nuget -n Feenics --allow-insecure-connections

    - name: Restore Packages
      run: nuget restore

    - name: Publish Monitor App
      run: dotnet publish FeenicsCardSwipeMonitor/FeenicsCardSwipeMonitor.csproj -c Release --no-restore -o publish/Monitor

    - name: Publish Import Tool
      run: dotnet publish FeenicsCsvImport/FeenicsCsvImport.csproj -c Release --no-restore -o publish/ImportTool
      
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
