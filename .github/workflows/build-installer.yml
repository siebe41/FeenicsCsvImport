name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # 1. Install GitVersion (Pinned to 6.0.x for your v6 config)
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    # 2. Setup MSBuild and NuGet (Required for older .NET Framework projects)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    # 3. Create the NuGet.config for the Feenics feed
    - name: Create NuGet Config
      shell: pwsh
      run: |
        $config = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            <add key="Feenics" value="http://nuget-secure.feenics.com/nuget" allowInsecureConnections="true" />
          </packageSources>
        </configuration>
        "@
        $config | Out-File -FilePath nuget.config -Encoding utf8

    # 4. Restore using NuGet.exe (Handles packages.config and old .csproj references correctly)
    - name: Restore Dependencies
      run: nuget restore FeenicsCsvImport.sln -ConfigFile nuget.config

    # 5. Build the entire solution using MSBuild
    - name: Build Solution
      run: msbuild FeenicsCsvImport.sln /p:Configuration=Release /p:Version="${{ steps.gitversion.outputs.semVer }}"

    # 6. Build the Inno Setup Installer
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    # 7. Upload to GitHub Release
    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
