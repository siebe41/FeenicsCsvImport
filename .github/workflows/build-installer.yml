name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # 1. Install GitVersion (Pinned to 6.0.x for v6 config support)
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    # 2. Manually create the NuGet.config with the explicit 'allowInsecureConnections' flag
    - name: Create NuGet Config
      run: |
        echo "<?xml version='1.0' encoding='utf-8'?>
        <configuration>
          <packageSources>
            <add key='nuget.org' value='https://api.nuget.org/v3/index.json' protocolVersion='3' />
            <add key='Feenics' value='http://nuget-secure.feenics.com/nuget' />
          </packageSources>
          <config>
            <add key='allowInsecureConnections' value='true' />
          </config>
        </configuration>" > nuget.config

    # 3. Restore using the explicit config file
    - name: Restore Dependencies
      run: dotnet restore --configfile nuget.config

    # 4. Build the solution to ensure the Class Library and Apps are compiled
    - name: Build Solution
      run: dotnet build -c Release --no-restore

    # 5. Publish to specific folders for the Installer to grab
    - name: Publish Monitor App
      run: dotnet publish FeenicsCardSwipeMonitor/FeenicsCardSwipeMonitor.csproj -c Release -o publish/Monitor --no-restore

    - name: Publish Import Tool
      run: dotnet publish FeenicsCsvImport/FeenicsCsvImport.csproj -c Release -o publish/ImportTool --no-restore
      
    # 6. Build the installer passing the SemVer from GitVersion
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    # 7. Upload the setup file to the GitHub Release
    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
