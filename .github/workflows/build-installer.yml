name: Build and Package Release

on:
  release:
    types: [published]
  workflow_dispatch: 

# Grants the workflow permission to upload the installer to your GitHub Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.0.0
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.0.0
      with:
        updateAssemblyInfo: true  # This is the magic switch for .NET 4.8

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Configure Feenics NuGet Source
      run: |
        nuget sources add -Name "Feenics" `
          -Source "http://nuget-secure.feenics.com/nuget" `
          -AllowInsecureConnections
        
    - name: Restore NuGet Packages
      run: nuget restore FeenicsCsvImport.sln

    - name: Build Solution
      run: |
        msbuild FeenicsCsvImport.sln `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:SignManifests=false `
          /p:SignAssembly=false
          
    - name: Create Self-Signed Certificate
      shell: pwsh
      run: |
        # Create personal certificate for Andrew Siebert
        $subject = "CN=Andrew Siebert, OU=Development, C=US"
        $cert = New-SelfSignedCertificate -Type CodeSigningCert `
          -Subject $subject `
          -HashAlgorithm sha256 `
          -NotAfter (Get-Date).AddYears(1)
        
        $password = ConvertTo-SecureString -String "Password123" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath "signing_cert.pfx" -Password $password
        Write-Host "Personal certificate created."

    - name: Sign Internal Executables
      shell: pwsh
      run: |
        # Dynamically find the signtool.exe path regardless of SDK version
        $sdkFolder = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\10.*" | Sort-Object Name -Descending | Select-Object -First 1
        $signTool = Join-Path $sdkFolder.FullName "x64\signtool.exe"
        Write-Host "Using SignTool at: $signTool"

        # Sign the primary apps before they are packaged into the installer
        $filesToSign = @(
          "FeenicsCsvImport.Gui\bin\Release\FeenicsCsvImport.Gui.exe",
          "FeenicsCardSwipeMonitor\bin\Release\FeenicsCardSwipeMonitor.exe"
        )

        foreach ($file in $filesToSign) {
          if (Test-Path $file) {
            & $signTool sign /f "signing_cert.pfx" /p "Password123" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $file
            Write-Host "Successfully signed: $file"
          } else {
            Write-Warning "File not found for signing: $file"
          }
        }

    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Sign Final Installer
      shell: pwsh
      run: |
        # Dynamically find signtool again for the final step
        $sdkFolder = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\10.*" | Sort-Object Name -Descending | Select-Object -First 1
        $signTool = Join-Path $sdkFolder.FullName "x64\signtool.exe"
        
        $installerPath = "Output\FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe"
        
        & $signTool sign `
          /f "signing_cert.pfx" `
          /p "Password123" `
          /d "Feenics CSV Tools" `
          /du "https://github.com/${{ github.repository }}" `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          $installerPath
          
        Write-Host "Installer successfully signed with personal info."

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
    
    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: raw-build-output
        path: FeenicsCsvImport.Gui/bin/Release/