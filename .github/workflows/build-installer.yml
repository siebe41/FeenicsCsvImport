name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # 1. Install GitVersion (Pinned to 6.0.x to support your v6 config and bypass the Action limits)
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    # 2. Setup NuGet (Using v2 to avoid the @v3 missing version error)
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    # 3. Configure the insecure Feenics feed
    - name: Configure Feenics Source
      run: |
        dotnet new nugetconfig --force
        dotnet nuget add source http://nuget-secure.feenics.com/nuget -n Feenics --allow-insecure-connections

    # 4. Use dotnet restore so the modern .NET SDK can build the dependency tree
    - name: Restore Packages
      run: dotnet restore

    # 5. Publish using the .NET CLI without the --no-restore flag
    - name: Publish Monitor App
      run: dotnet publish FeenicsCardSwipeMonitor/FeenicsCardSwipeMonitor.csproj -c Release -o publish/Monitor

    - name: Publish Import Tool
      run: dotnet publish FeenicsCsvImport/FeenicsCsvImport.csproj -c Release -o publish/ImportTool
      
    # 6. Build the installer passing the dynamic version
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    # 7. Upload to the GitHub Release page
    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
