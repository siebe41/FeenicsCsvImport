name: Build and Package Release

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.0.0
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.0.0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # Ensure the Feenics feed is available for the restore
    - name: Configure Feenics NuGet Source
      run: |
        dotnet nuget add source http://nuget-secure.feenics.com/nuget -n Feenics --allow-insecure-connections

    - name: Restore NuGet Packages
      run: nuget restore FeenicsCsvImport.sln

    - name: Build Solution
      # We disable signing here to avoid the certificate errors you saw earlier
      run: msbuild FeenicsCsvImport.sln /p:Configuration=Release /p:Version="${{ steps.gitversion.outputs.semVer }}" /p:SignManifests=false /p:SignAssembly=false

    - name: Compile Inno Setup Installer
      # This passes the version from GitVersion into the .iss script
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
