name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    - name: Create NuGet Config
      shell: pwsh
      run: |
        $config = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            <add key="Feenics" value="http://nuget-secure.feenics.com/nuget" allowInsecureConnections="true" />
          </packageSources>
        </configuration>
        "@
        $config | Out-File -FilePath nuget.config -Encoding utf8

    # 1. Clean previous artifacts to prevent "ghost" errors
    - name: Clean Solution
      run: dotnet clean -c Release

    # 2. Restore and Build in a single unified step (removed --no-restore)
    - name: Build Solution
      run: dotnet build -c Release --configfile nuget.config

    # 3. Explicitly Publish
    - name: Publish Monitor App
      run: dotnet publish FeenicsCardSwipeMonitor/FeenicsCardSwipeMonitor.csproj -c Release -o publish/Monitor --no-restore

    - name: Publish Import Tool
      run: dotnet publish FeenicsCsvImport/FeenicsCsvImport.csproj -c Release -o publish/ImportTool --no-restore
      
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
