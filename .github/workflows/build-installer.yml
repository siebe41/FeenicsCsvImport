name: Build and Package Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.1.11
      with:
        versionSpec: '6.0.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3.1.11

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    - name: Configure Feenics Source
      run: |
        dotnet new nugetconfig --force
        dotnet nuget add source http://nuget-secure.feenics.com/nuget -n Feenics --allow-insecure-connections

    # Force a clean restore on the whole solution
    - name: Restore Dependencies
      run: dotnet restore --force --no-cache

    # Explicitly build the Class Library first since both apps depend on it
    - name: Build Class Library
      run: dotnet build FeenicsCsvImport.ClassLibrary/FeenicsCsvImport.ClassLibrary.csproj -c Release

    - name: Publish Monitor App
      run: dotnet publish FeenicsCardSwipeMonitor/FeenicsCardSwipeMonitor.csproj -c Release -o publish/Monitor --no-restore

    - name: Publish Import Tool
      run: dotnet publish FeenicsCsvImport/FeenicsCsvImport.csproj -c Release -o publish/ImportTool --no-restore
      
    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ steps.gitversion.outputs.semVer }}" installer.iss

    - name: Upload Installer to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/FeenicsToolsSetup-${{ steps.gitversion.outputs.semVer }}.exe
